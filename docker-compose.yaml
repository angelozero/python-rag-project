services:
  litellm:
    image: litellm/litellm
    container_name: litellm_local
    #platform: linux/arm64
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--detailed_debug"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped